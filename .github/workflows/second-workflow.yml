name: Second Workflow
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Get dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: npm-dep-$-{{ hashFiles('**/package-lock.json') }}
          run: npm ci
      - name: Lint code
        run: npm run lint
      - name: List content
        run: ls -al
      - name: Run the server
        run: npm run dev < /dev/null & npx wait-on "http://localhost:5173" --timeout 10s
      - name: Cypress Tests
        run: npx cypress run
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Get dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: npm-dep-$-{{ hashFiles('**/package-lock.json') }}
          run: npm ci
      - name: Build the app
        run: npm run build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pseudo Deployment
        run: echo "Deploying App"
