name: Third Workflow
on: push
jobs:
  build:
    strategy:
      matrix:
        node-version: ["latest", 20, 16]
        os-version: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os-version }}
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Get dependencies
        run: npm ci
      - name: Build the app
        run: npm run build
